<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbgis — Поиск компаний</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading {
            display: none;
        }
        .loading.active {
            display: inline-block;
        }
        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold text-gray-900">dbgis</h1>
            <p class="text-gray-600 mt-1">Поиск организаций из базы 2ГИС</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Filters Panel -->
        <div class="bg-white rounded-lg shadow p-6 mb-8 fade-in">
            <h2 class="text-xl font-bold text-gray-900 mb-6">Фильтры</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                <!-- City Filter -->
                <div>
                    <label for="city" class="block text-sm font-medium text-gray-700 mb-2">
                        Город
                    </label>
                    <input
                        type="text"
                        id="city"
                        placeholder="Например: Санкт-Петербург"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                </div>

                <!-- Category Filter -->
                <div>
                    <label for="category" class="block text-sm font-medium text-gray-700 mb-2">
                        Категория / Рубрика
                    </label>
                    <input
                        type="text"
                        id="category"
                        placeholder="Например: Кафе"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                </div>

                <!-- Limit -->
                <div>
                    <label for="limit" class="block text-sm font-medium text-gray-700 mb-2">
                        Количество результатов
                    </label>
                    <input
                        type="number"
                        id="limit"
                        value="50"
                        min="1"
                        max="1000"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                </div>
            </div>

            <!-- Checkboxes -->
            <div class="flex flex-wrap gap-6 mb-6">
                <label class="flex items-center">
                    <input
                        type="checkbox"
                        id="has_email"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                    >
                    <span class="ml-2 text-sm text-gray-700">Только с Email</span>
                </label>

                <label class="flex items-center">
                    <input
                        type="checkbox"
                        id="has_phone"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                    >
                    <span class="ml-2 text-sm text-gray-700">Только с телефоном</span>
                </label>

                <label class="flex items-center">
                    <input
                        type="checkbox"
                        id="has_website"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                    >
                    <span class="ml-2 text-sm text-gray-700">Только с сайтом</span>
                </label>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-3">
                <button
                    onclick="searchCompanies()"
                    class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition"
                >
                    Найти
                </button>

                <button
                    onclick="exportCSV()"
                    class="px-6 py-2 bg-green-600 text-white font-medium rounded-md hover:bg-green-700 transition"
                >
                    Скачать CSV
                </button>

                <button
                    onclick="resetFilters()"
                    class="px-6 py-2 bg-gray-300 text-gray-900 font-medium rounded-md hover:bg-gray-400 transition"
                >
                    Очистить
                </button>

                <div class="loading active" id="loading-spinner">
                    <div class="spinner"></div>
                </div>
                <span id="loading-text" class="loading active text-gray-600 text-sm ml-2">Загрузка…</span>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" style="display: none;" class="fade-in">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="mb-4 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-900">Результаты</h2>
                    <span id="result-count" class="text-gray-600">Найдено компаний: 0</span>
                </div>

                <!-- Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b-2 border-gray-200">
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Название</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Город</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Адрес</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Домен</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Телефоны</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Email</th>
                                <th class="text-left px-4 py-3 font-semibold text-gray-900">Категории</th>
                            </tr>
                        </thead>
                        <tbody id="results-table">
                            <!-- Результаты вставляются сюда -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Info -->
                <div class="mt-4 text-center text-sm text-gray-600">
                    <span id="pagination-info">0 из 0</span>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-12">
            <p class="text-gray-500 text-lg">Нажмите кнопку "Найти" для поиска компаний</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-600">
            <p>dbgis v1.0 — API для поиска организаций из 2ГИС</p>
        </div>
    </footer>

    <script>
        function getFilters() {
            return {
                city: document.getElementById('city').value || null,
                category: document.getElementById('category').value || null,
                has_email: document.getElementById('has_email').checked ? true : null,
                has_phone: document.getElementById('has_phone').checked ? true : null,
                has_website: document.getElementById('has_website').checked ? true : null,
                limit: parseInt(document.getElementById('limit').value) || 50
            };
        }

        function showLoading() {
            document.getElementById('loading-spinner').classList.add('active');
            document.getElementById('loading-text').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading-spinner').classList.remove('active');
            document.getElementById('loading-text').classList.remove('active');
        }

        async function searchCompanies() {
            showLoading();
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';

            const filters = getFilters();
            const params = new URLSearchParams();

            if (filters.city) params.append('city', filters.city);
            if (filters.category) params.append('category', filters.category);
            if (filters.has_email) params.append('has_email', 'true');
            if (filters.has_phone) params.append('has_phone', 'true');
            if (filters.has_website) params.append('has_website', 'true');
            params.append('limit', filters.limit);

            try {
                const response = await fetch(`/api/companies?${params}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (data.data.length === 0) {
                    document.getElementById('empty-state').innerHTML =
                        '<p class="text-gray-500 text-lg">По вашему запросу не найдено компаний</p>';
                    hideLoading();
                    return;
                }

                displayResults(data);
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('results-section').style.display = 'block';

            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('empty-state').innerHTML =
                    `<p class="text-red-600 text-lg">Ошибка при загрузке: ${error.message}</p>`;
            } finally {
                hideLoading();
            }
        }

        function displayResults(data) {
            const tbody = document.getElementById('results-table');
            tbody.innerHTML = '';

            data.data.forEach(company => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-200 hover:bg-gray-50 cursor-pointer';
                row.onclick = () => viewCompanyDetail(company.id);

                row.innerHTML = `
                    <td class="px-4 py-3 font-medium text-blue-600">${escapeHtml(company.name)}</td>
                    <td class="px-4 py-3">${escapeHtml(company.city || '—')}</td>
                    <td class="px-4 py-3 text-xs">${escapeHtml(company.address || '—')}</td>
                    <td class="px-4 py-3 text-blue-600">${company.domain ? `<a href="http://${escapeHtml(company.domain)}" target="_blank">${escapeHtml(company.domain)}</a>` : '—'}</td>
                    <td class="px-4 py-3 text-xs">${escapeHtml(company.phones || '—')}</td>
                    <td class="px-4 py-3 text-xs">${escapeHtml(company.emails || '—')}</td>
                    <td class="px-4 py-3 text-xs">${escapeHtml(company.categories || '—')}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('result-count').textContent =
                `Найдено компаний: ${data.total}`;
            document.getElementById('pagination-info').textContent =
                `${data.data.length} из ${data.total}`;
        }

        async function exportCSV() {
            showLoading();
            const filters = getFilters();
            const params = new URLSearchParams();

            if (filters.city) params.append('city', filters.city);
            if (filters.category) params.append('category', filters.category);
            if (filters.has_email) params.append('has_email', 'true');
            if (filters.has_phone) params.append('has_phone', 'true');
            if (filters.has_website) params.append('has_website', 'true');
            params.append('limit', Math.min(filters.limit, 5000));

            try {
                const response = await fetch(`/api/export?${params}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'dbgis_export.csv';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();

            } catch (error) {
                console.error('Ошибка экспорта:', error);
                alert('Ошибка при экспорте: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function resetFilters() {
            document.getElementById('city').value = '';
            document.getElementById('category').value = '';
            document.getElementById('limit').value = '50';
            document.getElementById('has_email').checked = false;
            document.getElementById('has_phone').checked = false;
            document.getElementById('has_website').checked = false;
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('empty-state').innerHTML =
                '<p class="text-gray-500 text-lg">Нажмите кнопку "Найти" для поиска компаний</p>';
        }

        function viewCompanyDetail(companyId) {
            // Будущая функция для просмотра полной информации о компании
            console.log('Просмотр компании:', companyId);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Поиск при нажатии Enter
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('city').addEventListener('keypress', e => {
                if (e.key === 'Enter') searchCompanies();
            });
            document.getElementById('category').addEventListener('keypress', e => {
                if (e.key === 'Enter') searchCompanies();
            });

            // Скрыть загрузчик при загрузке страницы
            hideLoading();
        });
    </script>
</body>
</html>
