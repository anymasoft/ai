<!DOCTYPE html>
<html>
<head>
<title>Lead Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body {
font-family: Inter, sans-serif;
background: #ffffff;
color: #111827;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 32px;
border-bottom:1px solid #e5e7eb;
}

.logo{
font-weight:600;
font-size:18px;
}

.container{
max-width:900px;
margin:80px auto;
text-align:center;
}

textarea{
width:100%;
height:120px;
border:1px solid #e5e7eb;
border-radius:6px;
padding:12px;
font-size:14px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:6px;
padding:10px 18px;
margin-top:12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:40px;
}

th{
text-align:left;
font-weight:500;
padding:12px;
border-bottom:1px solid #e5e7eb;
}

td{
padding:12px;
border-bottom:1px solid #f3f4f6;
}

tr:hover{
background:#fafafa;
}

</style>
</head>

<body>

<header>

<div class="logo">LeadExtractor</div>

<div>
Dashboard
Export CSV
Account
</div>

</header>

<div class="container">

<h1>Find Contacts from Company Websites</h1>

<p>Paste company websites or upload CSV</p>

<textarea placeholder="example.com
startup.io
company.org"></textarea>

<br>

<button>Find Contacts</button>

<table>

<thead>
<tr>
<th>Company</th>
<th>Website</th>
<th>Email</th>
<th>Phone</th>
<th>Source</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr>
<td>ACME</td>
<td>acme.com</td>
<td>sales@acme.com</td>
<td>+1 555 000</td>
<td>/contact</td>
<td><button>Email</button></td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
